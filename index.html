<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Temple Run Beta v2</title>

<link rel="stylesheet" href="game.css">

</head>

<body>

<div id="game">

    <!-- Background -->
    <img src="background.jpeg" id="background">

    <!-- Road -->
    <img src="road.png" id="road">

    <!-- Score -->
    <div id="scoreBox">

        <h2>Score</h2>

        <span id="score">0</span>

    </div>

    <!-- Coins -->

    <div id="coinBox">

        <h2>Coins</h2>

        <span id="coins">0</span>

    </div>

    <!-- Player -->

    <img  src="player.png" id="player">

    <!-- Obstacles -->

    <div id="obstacleContainer">

    </div>

    <!-- Coins -->

    <div id="coinContainer">

    </div>

    <!-- Trees -->

    <div id="treeContainer">

    </div>

    <!-- Game Over -->

    <div id="gameOver">

        <h1>

        GAME OVER

        </h1>

        <button
        onclick="restartGame()">

        Restart

        </button>

    </div>

</div>


<!-- Mobile Controls -->

<div id="controls">

<button id="left">

⬅️

</button>

<button id="jump">

⬆️

</button>

<button id="right">

➡️

</button>

</div>

<script src="game.js">

</script>

</body>

</html>
